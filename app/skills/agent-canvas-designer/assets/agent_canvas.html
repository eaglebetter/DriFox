<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能体画布 - 辅助建模流程设计工具</title>
<style>
:root {
    --bg: #f0f2f5;
    --panel-bg: #fff;
    --sidebar-bg: #1e2433;
    --sidebar-text: #adb5bd;
    --sidebar-active: #3b82f6;
    --canvas-bg: #f5f6f8;
    --node-blue: #3b82f6;
    --node-green: #22c55e;
    --node-orange: #f59e0b;
    --node-purple: #8b5cf6;
    --node-red: #ef4444;
    --node-cyan: #06b6d4;
    --node-pink: #ec4899;
    --node-gray: #6b7280;
    --border: #e5e7eb;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; height:100vh; background: var(--bg); }

/* ========= 顶部工具栏 ========= */
.toolbar {
    height: 48px;
    background: #fff;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    justify-content: space-between;
    z-index: 100;
    position: relative;
}
.toolbar-left { display:flex; align-items:center; gap:12px; }
.toolbar-logo { font-size:18px; font-weight:700; color:#1e293b; }
.toolbar-logo span { color: var(--node-blue); }
.toolbar-right { display:flex; gap:8px; }
.btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:13px; transition: all .15s; display:flex; align-items:center; gap:4px; }
.btn:hover { background:#f8fafc; }
.btn-primary { background: var(--node-blue); color: #fff; border-color: var(--node-blue); }
.btn-primary:hover { background: #2563eb; }
.btn-outline { border-color: var(--node-blue); color: var(--node-blue); }
.btn-outline:hover { background: #eff6ff; }
.btn-danger { color: #ef4444; border-color: #fecaca; }
.btn-danger:hover { background: #fef2f2; }
.flow-tabs { display:flex; gap:2px; }
.flow-tab { padding:4px 12px; border-radius:4px; font-size:12px; cursor:pointer; transition:.15s; color:#64748b; }
.flow-tab:hover { background:#f1f5f9; }
.flow-tab.active { background:#eff6ff; color: var(--node-blue); font-weight:600; }

/* ========= 主布局 ========= */
.main-layout { display:flex; height:calc(100vh - 48px); }

/* ========= 左侧组件面板 ========= */
.sidebar { width:260px; background: #fff; border-right:1px solid var(--border); overflow-y:auto; display:flex; flex-direction:column; }
.sidebar-search { padding:12px; border-bottom:1px solid var(--border); }
.sidebar-search input { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; }
.sidebar-search input:focus { border-color: var(--node-blue); }
.sidebar-section { padding:8px 0; }
.sidebar-section-title { padding:8px 16px; font-size:11px; font-weight:600; color:#94a3b8; text-transform:uppercase; letter-spacing:.5px; }
.sidebar-item { display:flex; align-items:center; gap:10px; padding:9px 16px; cursor:grab; font-size:13px; transition:.12s; border-left:3px solid transparent; }
.sidebar-item:hover { background:#f8fafc; border-left-color: var(--node-blue); }
.sidebar-item:active { cursor:grabbing; opacity:.7; }
.sidebar-item-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; flex-shrink:0; }
.sidebar-item-text { color:#334155; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ========= 画布 ========= */
.canvas-wrap { flex:1; position:relative; overflow:hidden; }
.canvas-inner { width:4000px; height:3000px; background:var(--canvas-bg); position:relative; }
.dot-grid { position:absolute; inset:0; background-image: radial-gradient(circle, #d1d5db 1px, transparent 1px); background-size:24px 24px; pointer-events:none; }
.canvas-toolbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:4px; background:#fff; border-radius:8px; padding:6px; box-shadow: 0 2px 12px rgba(0,0,0,.1); z-index:50; }
.canvas-toolbar button { width:32px; height:32px; border:1px solid var(--border); border-radius:6px; background:#fff; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.canvas-toolbar button:hover { background:#f1f5f9; }
.zoom-label { font-size:11px; color:#64748b; width:50px; text-align:center; line-height:32px; }

/* ========= 节点样式 ========= */
.flow-node {
    position: absolute;
    border-radius: 12px;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
    cursor: move;
    user-select: none;
    transition: box-shadow .15s;
    z-index: 10;
    min-width: 180px;
    font-size:13px;
}
.flow-node:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12), 0 0 0 2px rgba(59,130,246,.15); z-index:20; }
.flow-node.selected { box-shadow: 0 0 0 3px var(--node-blue), 0 4px 16px rgba(59,130,246,.2); z-index:30; }
.node-header { padding:10px 14px; border-radius:12px 12px 0 0; display:flex; align-items:center; gap:8px; font-weight:600; color:#fff; font-size:13px; }
.node-body { padding:8px 14px 12px; }
.node-port { width:12px; height:12px; border-radius:50%; background:#94a3b8; border:2px solid #fff; position:absolute; cursor:crosshair; z-index:40; }
.node-port:hover { background: var(--node-blue); transform:scale(1.3); }

/* 节点变体 */
.flow-node.start .node-header { background:#22c55e; border-radius:50%; width:72px; height:72px; justify-content:center; padding:0; }
.flow-node.start .node-body { display:none; }
.flow-node.start .node-port-top, .flow-node.start .node-port-bottom, .flow-node.start .node-port-left, .flow-node.start .node-port-right { display: block; }
.flow-node.end .node-header { background:#ef4444; border-radius:50%; width:72px; height:72px; justify-content:center; padding:0; }
.flow-node.end .node-body { display:none; }

.flow-node.llm .node-header { background: #8b5cf6; }
.flow-node.knowledge .node-header { background: #06b6d4; }
.flow-node.ask-table .node-header { background: #0ea5e9; }
.flow-node.api-request .node-header { background: #f59e0b; }
.flow-node.reply .node-header { background: #22c55e; }
.flow-node.agent .node-header { background: #6366f1; }
.flow-node.condition .node-header { background: #ef4444; }
.flow-node.loop .node-header { background: #14b8a6; }
.flow-node.iterate .node-header { background: #14b8a6; }
.flow-node.classifier .node-header { background: #ec4899; }
.flow-node.code .node-header { background: #334155; }
.flow-node.doc-extractor .node-header { background: #6b7280; }
.flow-node.param-extractor .node-header { background: #a855f7; }

/* 容器样式 */
.flow-node.container { background: rgba(248,250,252,0.9); border:2px dashed #cbd5e1; min-width:200px; min-height:120px; overflow:auto; }
.flow-node.container .node-header { background: transparent; color: #64748b; border-bottom:1px dashed #cbd5e1; font-size:12px; text-transform:uppercase; letter-spacing:.5px; cursor:move; }
.flow-node.container .node-body { font-size:11px; color:#94a3b8; min-height:60px; }
.container-drag-handle { cursor:move !important; }

/* ========= 详情面板 ========= */
.detail-panel {
    width: 380px;
    background: #fff;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    transition: width .2s;
}
.detail-panel.hidden { width:0; overflow:hidden; border:none; }

/* ========= jsPlumb 端点样式 ========= */
/* 确保端点始终可点击 */
.jtk-endpoint { z-index: 50 !important; pointer-events: auto !important; }
.jtk-endpoint canvas { pointer-events: none !important; }
.jtk-connector { z-index:5 !important; }
.detail-header { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#fff; z-index:5; }
.detail-header h3 { font-size:15px; font-weight:600; }
.detail-close { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.detail-close:hover { background:#f1f5f9; }
.detail-content { padding:16px; display:flex; flex-direction:column; gap:16px; }

.detail-field { display:flex; flex-direction:column; gap:4px; }
.detail-field label { font-size:12px; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.3px; }
.detail-field input, .detail-field textarea, .detail-field select {
    padding:8px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; width:100%;
}
.detail-field textarea { resize:vertical; font-family:'SF Mono','Cascadia Code',monospace; font-size:12px; line-height:1.5; }
.detail-field input:focus, .detail-field textarea:focus, .detail-field select:focus { border-color: var(--node-blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.detail-code-block { background:#1e293b; color:#e2e8f0; padding:12px; border-radius:8px; font-family:'SF Mono','Cascadia Code',monospace; font-size:12px; line-height:1.6; white-space:pre-wrap; overflow-x:auto; }
.detail-tag { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; margin:2px; }
.detail-tag.blue { background:#dbeafe; color:#1d4ed8; }
.detail-tag.green { background:#dcfce7; color:#16a34a; }
.detail-tag.orange { background:#fff7ed; color:#ea580c; }
.detail-tag.purple { background:#f3e8ff; color:#7c3aed; }

/* ========= jsPlumb 覆盖 ========= */
.jtk-endpoint, .jtk-endpoint * { pointer-events: none !important; }
.jtk-connector { z-index:5 !important; }
.jtk-endpoint { z-index:6 !important; }
.jtk-overlay { z-index:15 !important; }

/* ========= 空状态 ========= */
.empty-hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:#94a3b8; pointer-events:none; }
.empty-hint svg { width:80px; height:80px; opacity:.3; margin-bottom:12px; }
.empty-hint p { font-size:13px; }

/* ========= 右键菜单 ========= */
.context-menu { position:fixed; background:#fff; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,.15); z-index:1000; padding:4px; display:none; min-width:160px; border:1px solid var(--border); }
.context-menu-item { padding:8px 12px; border-radius:4px; cursor:pointer; font-size:13px; display:flex; align-items:center; gap:8px; }
.context-menu-item:hover { background:#f1f5f9; }
.context-menu-item.danger { color:#ef4444; }
</style>
</head>
<body>
<div class="toolbar">
    <div class="toolbar-left">
        <div class="toolbar-logo">🖥 <span>智能体画布</span></div>
        <div class="flow-tabs">
            <div class="flow-tab active" data-flow="new" onclick="switchFlow('new',this)">新建模型</div>
            <div class="flow-tab" data-flow="optimize" onclick="switchFlow('optimize',this)">模型优化</div>
            <div class="flow-tab" data-flow="param" onclick="switchFlow('param',this)">参数推荐</div>
        </div>
    </div>
    <div class="toolbar-right">
        <button class="btn btn-outline" onclick="loadFromFile()">📂 加载配置</button>
        <button class="btn btn-primary" onclick="exportToFile()">📤 导出反馈</button>
    </div>
</div>

<div class="main-layout">
    <!-- 左侧组件面板 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-search">
            <input type="text" placeholder="🔍 搜索组件..." oninput="filterComponents(this.value)">
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">基础</div>
            <div class="sidebar-item" draggable="true" data-type="start" data-label="开始">
                <div class="sidebar-item-icon" style="background:#22c55e">▶</div>
                <span class="sidebar-item-text">开始</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="reply" data-label="回复">
                <div class="sidebar-item-icon" style="background:#22c55e">✉</div>
                <span class="sidebar-item-text">回复</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="end" data-label="结束">
                <div class="sidebar-item-icon" style="background:#ef4444">■</div>
                <span class="sidebar-item-text">结束</span>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">AI 组件</div>
            <div class="sidebar-item" draggable="true" data-type="llm" data-label="大模型">
                <div class="sidebar-item-icon" style="background:#8b5cf6">🤖</div>
                <span class="sidebar-item-text">大模型组件</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="agent" data-label="Agent">
                <div class="sidebar-item-icon" style="background:#6366f1">🦾</div>
                <span class="sidebar-item-text">Agent 组件</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="classifier" data-label="问题分类器">
                <div class="sidebar-item-icon" style="background:#ec4899">🏷</div>
                <span class="sidebar-item-text">问题分类器</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="param-extractor" data-label="参数提取器">
                <div class="sidebar-item-icon" style="background:#a855f7">📋</div>
                <span class="sidebar-item-text">参数提取器</span>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">知识 & 数据</div>
            <div class="sidebar-item" draggable="true" data-type="knowledge" data-label="知识检索">
                <div class="sidebar-item-icon" style="background:#06b6d4">📚</div>
                <span class="sidebar-item-text">知识检索</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="ask-table" data-label="智能问表">
                <div class="sidebar-item-icon" style="background:#0ea5e9">📊</div>
                <span class="sidebar-item-text">智能问表</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="doc-extractor" data-label="文档提取器">
                <div class="sidebar-item-icon" style="background:#6b7280">📄</div>
                <span class="sidebar-item-text">文档提取器</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="api-request" data-label="接口请求">
                <div class="sidebar-item-icon" style="background:#f59e0b">🌐</div>
                <span class="sidebar-item-text">接口请求</span>
            </div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-section-title">控制流</div>
            <div class="sidebar-item" draggable="true" data-type="condition" data-label="条件分支">
                <div class="sidebar-item-icon" style="background:#ef4444">↗</div>
                <span class="sidebar-item-text">条件分支</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="container" data-label="循环">
                <div class="sidebar-item-icon" style="background:#14b8a6">⟳</div>
                <span class="sidebar-item-text">循环</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="container" data-label="迭代">
                <div class="sidebar-item-icon" style="background:#14b8a6">⤿</div>
                <span class="sidebar-item-text">迭代</span>
            </div>
            <div class="sidebar-item" draggable="true" data-type="code" data-label="代码执行">
                <div class="sidebar-item-icon" style="background:#334155">⟨⟩</div>
                <span class="sidebar-item-text">代码执行</span>
            </div>
        </div>
    </div>

    <!-- 画布 -->
    <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas-inner" id="canvas">
            <div class="dot-grid"></div>
            <div class="empty-hint" id="emptyHint">
                <svg viewBox="0 0 80 80"><rect x="10" y="10" width="60" height="60" rx="8" fill="#e2e8f0"/><circle cx="30" cy="40" r="8" fill="#cbd5e1"/><rect x="42" y="32" width="28" height="16" rx="4" fill="#cbd5e1"/></svg>
                <p>从左侧拖拽组件到画布</p>
            </div>
        </div>
        <div class="canvas-toolbar">
            <button onclick="zoom(-0.1)">−</button>
            <span class="zoom-label" id="zoomLabel">100%</span>
            <button onclick="zoom(0.1)">+</button>
            <button onclick="fitView()">⊡</button>
        </div>
    </div>

    <!-- 右侧详情面板 -->
    <div class="detail-panel hidden" id="detailPanel">
        <div class="detail-header">
            <h3 id="detailTitle">节点配置</h3>
            <button class="detail-close" onclick="closeDetail()">✕</button>
        </div>
        <div class="detail-content" id="detailContent"></div>
    </div>
</div>

<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" onclick="contextCopy()">📋 复制节点</div>
    <div class="context-menu-item danger" onclick="contextDelete()">🗑 删除节点</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsplumb@2.15.6/dist/js/jsplumb.min.js">
</script>
<script>
/* ==================== 核心变量 ==================== */
let jsp, nodeId=0, selectedNode=null, nodes=[], currentFlow='new', scale=1;
let contextTarget=null;

const NODE_CONFIGS = {};
initNodeConfigs();

function initNodeConfigs() {
NODE_CONFIGS.reply = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'回复'},
    {key:'reply_type',label:'回复类型',type:'select',opts:['直接回复','使用模板'],default:'直接回复'},
    {key:'content',label:'回复内容',type:'textarea',default:'根据分析结果，回复用户以下内容：\n- 问题定位已完成\n- 已生成对应模型规则\n- 请确认是否需要进一步调整',hint:'支持变量引用，如 {{sys.query}}'}
]};
NODE_CONFIGS.start = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'开始'},
    {key:'params',label:'输入参数',type:'textarea',default:'sys.query = 用户输入的问题描述\nsys.files = 用户上传的文件',hint:'根节点，sys.query 为用户原始输入'}
]};
NODE_CONFIGS.end = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'结束'},
    {key:'outputs',label:'输出参数',type:'textarea',default:'result = 最终输出结果',hint:'流程终点'}
]};
NODE_CONFIGS.llm = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'大模型'},
    {key:'model',label:'模型',type:'text',default:'gpt-4 / qwen-plus / deepseek-chat'},
    {key:'system_prompt',label:'系统提示词',type:'textarea',default:'你是一个工业设备故障诊断专家。你有丰富的旋转机械（如汽轮机、压缩机、泵）的故障诊断经验。\n\n请严格遵守以下规则：\n1. 基于用户提供的信息进行分析\n2. 引用知识库中的专业知识\n3. 给出明确的故障定位和建议\n4. 如果信息不足，主动询问补充信息',hint:'系统级提示词，定义大模型行为'},
    {key:'user_prompt',label:'用户提示词',type:'textarea',default:'请分析以下设备问题：\n\n问题描述：{{node_2.output}}\n知识库参考：{{node_3.output}}\n\n请给出：\n1. 故障根因分析\n2. 建议的监测参数\n3. 判断规则建议',hint:'用户级提示词，可使用 {{node_id.output}} 引用上游输出'}
]};
NODE_CONFIGS.knowledge = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'知识检索'},
    {key:'kb_type',label:'需要配置的知识库类型',type:'select',opts:['设备运行规程库','历史故障案例库','设备说明书库','定值手册库','模型模板库','振动标准库（ISO 10816）','热力学参数库'],default:'设备运行规程库'},
    {key:'query',label:'检索语句',type:'textarea',default:'{{sys.query}}',hint:'知识库检索关键词，引用上游节点输出'},
    {key:'top_k',label:'返回数量',type:'text',default:'5'},
    {key:'threshold',label:'相似度阈值',type:'text',default:'0.7'}
]};
NODE_CONFIGS['ask-table'] = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'智能问表'},
    {key:'table',label:'关联数据库表',type:'text',default:'equipment_alarm_history'},
    {key:'db_type',label:'数据库类型',type:'text',default:'MySQL / PostgreSQL'},
    {key:'question',label:'自然语言问题',type:'textarea',default:'查询最近30天内轴承温度超过80℃的告警记录，按时间降序排列',hint:'自然语言描述，自动转SQL查询'}
]};
NODE_CONFIGS['api-request'] = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'接口请求'},
    {key:'method',label:'请求方法',type:'select',opts:['GET','POST','PUT','DELETE'],default:'POST'},
    {key:'url',label:'API 地址',type:'text',default:'https://api.example.com/v1/monitor/status'},
    {key:'headers',label:'请求头',type:'textarea',default:'{"Content-Type":"application/json","Authorization":"Bearer {{api_key}}"}'},
    {key:'body',label:'请求体',type:'textarea',default:'{"device_id":"{{node_2.output.device_id}}","metric":"bearing_temp"}'}
]};
NODE_CONFIGS.agent = {fields:[
    {key:'title',label:'节点名称',type:'text',default:'Agent'},
    {key:'model',label:'模型',type:'text',default:'gpt-4'},

function autoLoadConfig(){
    // 检查URL参数 ?config=xxx.json
    const urlParams = new URLSearchParams(window.location.search);
    const configFile = urlParams.get('config');
    if(configFile){
        fetch(configFile)
            .then(r=>r.json())
            .then(data=>{
                if(data.nodeTypes){Object.keys(data.nodeTypes).forEach(function(k){if(!NODE_CONFIGS[k])NODE_CONFIGS[k]=data.nodeTypes[k];});}
                importData(data);
            })
            .catch(e=>console.error('自动加载失败:',e));
        return;
    }
    
    // 检查是否需要加载中考智能体配置
    const autoLoad = urlParams.get('auto');
    if(autoLoad === 'zhongkao'){
        loadZhongkaoAgent();
    }
}

let connectionsCache=[];
function connectionsUpdate(){
    connectionsCache=jsp.getAllConnections().map(function(c){
        var eps=c.getEndpoints();
        return {
            sourceId:c.sourceId,
            targetId:c.targetId,

/* ==================== 画布事件 ==================== */
function initCanvasEvents(){
document.getElementById('canvas').addEventListener('click',function(e){
    if(e.target===this||e.target.classList.contains('dot-grid')){
        selectedNode&&document.getElementById(selectedNode)&&document.getElementById(selectedNode).classList.remove('selected');
        selectedNode=null;document.getElementById('detailPanel').classList.add('hidden');
    }
});
document.addEventListener('keydown',function(e){
    if(e.key==='Delete'&&selectedNode){deleteNode(selectedNode);selectedNode=null;document.getElementById('detailPanel').classList.add('hidden');}
    if(e.key==='Escape'){selectedNode&&document.getElementById(selectedNode)&&document.getElementById(selectedNode).classList.remove('selected');selectedNode=null;document.getElementById('detailPanel').classList.add('hidden');hideContextMenu();}
});
document.addEventListener('click',function(e){if(!e.target.closest('.context-menu'))hideContextMenu();});
}

/* ==================== 拖放 ==================== */
let dragType,dragLabel;
function initDragDrop(){
document.querySelectorAll('.sidebar-item[draggable]').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragType=e.target.closest('[draggable]').dataset.type;dragLabel=e.target.closest('[draggable]').dataset.label;});
});
const cw=document.getElementById('canvasWrap');
cw.addEventListener('dragover',function(e){e.preventDefault();});
cw.addEventListener('drop',function(e){
    e.preventDefault();
    if(!dragType||!dragLabel)return;
    var rect=document.getElementById('canvas').getBoundingClientRect();
    var x=(e.clientX-rect.left)/scale-90;
    var y=(e.clientY-rect.top)/scale-24;
    // 检测是否落在容器内部
    var el=document.elementFromPoint(e.clientX,e.clientY);
    var container=el?el.closest('[data-is-container="true"]'):null;
    if(container){
        // 计算容器内的相对位置并转为画布坐标
        var cr=container.getBoundingClientRect();
        x=(e.clientX-cr.left)/scale-90 + parseInt(container.style.left);
        y=(e.clientY-cr.top)/scale-50 + parseInt(container.style.top);
    }
    createNode(dragType,dragLabel,x,y);
    updateEmptyHint();
});
}

/* ==================== 创建节点 ==================== */
function createNode(type,label,x,y){
const id='node_'+nodeId++;
const el=document.createElement('div');
el.id=id;el.className='flow-node '+type;
el.style.left=x+'px';el.style.top=y+'px';

let icon='';switch(type){
case'start':icon='▶';break; case'end':icon='■';break; case'llm':icon='🤖';break;
case'agent':icon='🦾';break; case'knowledge':icon='📚';break; case'ask-table':icon='📊';break;
case'api-request':icon='🌐';break; case'reply':icon='✉';break; case'condition':icon='↗';break;
case'classifier':icon='🏷';break; case'code':icon='⟨⟩';break; case'container':icon='⊞';break;
case'doc-extractor':icon='📄';break; case'param-extractor':icon='📋';break;
}
el.innerHTML='<div class="node-header">'+icon+' '+label+'</div><div class="node-body"></div>';

if(type==='start'||type==='end'){
    el.querySelector('.node-header').textContent=icon;
    el.style.width='72px';el.style.height='72px';
}
el.addEventListener('click',function(e){e.stopPropagation();selectNode(id);});
el.addEventListener('dblclick',function(){openDetail(id);});
el.addEventListener('contextmenu',function(e){e.preventDefault();showContextMenu(e,id);});

if(type==='container'){
    el.style.width='320px';el.style.height='180px';
    el.style.resize='both';el.style.overflow='visible';
    el.style.minWidth='200px';el.style.minHeight='120px';
    el.dataset.isContainer='true';
    el.querySelector('.node-header').classList.add('container-drag-handle');
    el.querySelector('.node-body').style.minHeight='80px';
    el.querySelector('.node-body').innerHTML='<span style="color:#94a3b8;font-size:11px;">子画布容器 — 拖入节点到此处</span>';
}

document.getElementById('canvas').appendChild(el);

// 拖拽
var dragOpts={containment:'parent',stop:function(e){updateNodePos(id,el);}};
if(type==='container'){
    dragOpts.handle='.container-drag-handle';
}else{
    // 非容器节点：提升z-index确保能选中
    el.style.zIndex='15';
}
jsp.draggable(el,dragOpts);

// 端口: 全部一输入一输出（容器也有端口用于连线）
var eps=[];
// 输入端口（左侧）
var epIn = jsp.addEndpoint(id,{
    uuid:id+'_in',anchor:'Left',isSource:false,isTarget:true,
    maxConnections:-1, dragAllowed:true,
    paintStyle:{fill:'#3b82f6',stroke:'#1d4ed8',strokeWidth:3,radius:6},
    hoverPaintStyle:{fill:'#2563eb',stroke:'#1e40af',strokeWidth:3,radius:7}
});
eps.push(epIn.getUuid());
// 输出端口（右侧）
var epOut = jsp.addEndpoint(id,{
    uuid:id+'_out',anchor:'Right',isSource:true,isTarget:false,
    maxConnections:-1, dragAllowed:true,
    paintStyle:{fill:'#3b82f6',stroke:'#1d4ed8',strokeWidth:3,radius:6},
    hoverPaintStyle:{fill:'#2563eb',stroke:'#1e40af',strokeWidth:3,radius:7}
});
eps.push(epOut.getUuid());
nodes.push({id,type,label,x,y,config:{},eps:eps});
updateEmptyHint();
return id;
}

function updateNodePos(id,el){
    var n=nodes.find(n=>n.id===id);if(n){n.x=parseInt(el.style.left)||0;n.y=parseInt(el.style.top)||0;}
    jsp.repaintEverything();
}


/* ==================== 选中/打开详情 ==================== */
function selectNode(id){
    if(selectedNode&&document.getElementById(selectedNode))document.getElementById(selectedNode).classList.remove('selected');
    selectedNode=id;document.getElementById(id).classList.add('selected');
    renderDetailPanel(id);
}

function openDetail(id){selectNode(id);}

function closeDetail(){document.getElementById('detailPanel').classList.add('hidden');}

/* ==================== 详情面板 ==================== */
function renderDetailPanel(id){
    const node=nodes.find(n=>n.id===id);
    if(!node)return;
    document.getElementById('detailPanel').classList.remove('hidden');
    document.getElementById('detailTitle').textContent=node.label+' — 配置';
    const cfg=NODE_CONFIGS[node.type]||{fields:[]};
    const saved=node.config||{};
    let html='';
    cfg.fields.forEach(f=>{
        const val=saved[f.key]||f.default||'';
        html+='<div class="detail-field">';
        html+='<label>'+f.label+'</label>';
        if(f.type==='textarea')html+='<textarea rows="8" data-key="'+f.key+'" onchange="updateNodeConfig(\''+id+'\')">'+escHtml(val)+'</textarea>';
        else if(f.type==='select'){html+='<select data-key="'+f.key+'" onchange="updateNodeConfig(\''+id+'\')">';f.opts.forEach(o=>html+='<option'+(val===o?' selected':'')+'>'+o+'</option>');html+='</select>';}
        else html+='<input type="'+f.type+'" value="'+escHtml(val)+'" data-key="'+f.key+'" onchange="updateNodeConfig(\''+id+'\')">';
        if(f.hint)html+='<span style="font-size:11px;color:#94a3b8;margin-top:2px;">'+f.hint+'</span>';
        html+='</div>';
    });
    if(node.type==='code'){
        const codeStr=saved.code||(cfg.fields.find(f=>f.key==='code')?cfg.fields.find(f=>f.key==='code').default:'');
        html+='<div class="detail-field"><label>代码预览</label><div class="detail-code-block">'+escHtml(codeStr)+'</div></div>';
    }
    if(node.type==='llm'||node.type==='agent'){
        html+='<div class="detail-field"><label>💡 提示词总览</label>';
        const sp=saved.system_prompt||'';
        const up=saved.user_prompt||'';
        html+='<div style="margin-top:4px;"><span class="detail-tag blue">系统提示词</span> '+sp.slice(0,100)+(sp.length>100?'...':'')+'</div>';
        html+='<div style="margin-top:4px;"><span class="detail-tag orange">用户提示词</span> '+up.slice(0,100)+(up.length>100?'...':'')+'</div>';
        if(node.type==='agent'){
            const tools=saved.tools||'';
            html+='<div style="margin-top:4px;"><span class="detail-tag purple">工具: '+tools+'</span></div>';
        }
        html+='</div>';
    }
    html+='<div style="border-top:1px solid #e5e7eb;padding-top:12px;display:flex;gap:8px;">';
    html+='<button class="btn btn-danger" style="flex:1" onclick="deleteNode(\''+id+'\');closeDetail();">🗑 删除节点</button>';
    html+='</div>';
    document.getElementById('detailContent').innerHTML=html;
}

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function updateNodeConfig(id){
    const node=nodes.find(n=>n.id===id);
    if(!node)return;
    node.config=node.config||{};
    document.querySelectorAll('#detailContent [data-key]').forEach(el=>{node.config[el.dataset.key]=el.value;});
    // 更新节点标签
    const cfg=NODE_CONFIGS[node.type];
    if(cfg){const tf=cfg.fields.find(f=>f.key==='title');if(tf&&node.config.title){node.label=node.config.title;const hdr=document.querySelector('#'+id+' .node-header');if(hdr){const icon=hdr.textContent.slice(0,2);hdr.textContent=icon+' '+node.config.title;}}}
}

/* ==================== 删除 & 清空 ==================== */
function deleteNode(id){
    // 删除该节点的所有连接
    var conns = jsp.getConnections({scope: id});
    conns.forEach(function(c) { c.remove(); });
    jsp.removeAllEndpoints(id);
    // 从DOM移除
    var el=document.getElementById(id);if(el)el.parentNode.removeChild(el);
    // 从数据移除

}

function importJSON(){
    var inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=function(){
        var reader=new FileReader();
        reader.onload=function(){
            try{var data=JSON.parse(reader.result);
                if(data.nodeTypes){Object.keys(data.nodeTypes).forEach(function(k){if(!NODE_CONFIGS[k])NODE_CONFIGS[k]=data.nodeTypes[k];});}
                importData(data);
            }catch(e){alert('导入失败：'+e.message);}
        };reader.readAsText(inp.files[0]);
    };inp.click();
}
function importData(data){
    clearCanvas(false);
    var idMap={};
    data.nodes.forEach(function(nd){
        var nid=createNode(nd.type,nd.label,nd.x,nd.y);
        if(nd.id)idMap[nd.id]=nid;
        var nn=nodes.find(function(n){return n.id===nid;});
        if(nn)nn.config=JSON.parse(JSON.stringify(nd.config||{}));
    });
    setTimeout(function(){
        (data.connections||[]).forEach(function(c){
            var sid=idMap[c.sourceId]||c.sourceId;
            var tid=idMap[c.targetId]||c.targetId;
            try{jsp.connect({source:sid,target:tid});}catch(e){}
        });
        // 检测容器内节点：提升z-index + 更新容器提示
        nodes.forEach(function(cn){
            if(cn.type!=='container')return;
            var cel=document.getElementById(cn.id);if(!cel)return;
            var cx=cn.x,cy=cn.y,cw=parseInt(cel.style.width)||320,ch=parseInt(cel.style.height)||180;
            var kids=[];
            nodes.forEach(function(kn){
                if(kn.id===cn.id||kn.type==='container')return;
                if(kn.x>=cx&&kn.x<=cx+cw&&kn.y>=cy&&kn.y<=cy+ch){
                    kids.push(kn);
                    var el=document.getElementById(kn.id);if(el)el.style.zIndex='30';
                }
            });
            var bd=cel.querySelector('.node-body');
            if(kids.length>0&&bd)bd.innerHTML='<span style="color:#334155;font-size:11px;">📦 '+kids.length+' 个节点</span>';
        });
        updateEmptyHint();jsp.repaintEverything();
    },400);
}
function loadFromJSON(jsonStr){

        if(data.nodeTypes){Object.keys(data.nodeTypes).forEach(function(k){if(!NODE_CONFIGS[k])NODE_CONFIGS[k]=data.nodeTypes[k];});}
        importData(data);return{success:true,nodeCount:data.nodes.length};
    }catch(e){return{success:false,error:e.message};}
}

/* ========== 热更新功能 ========== */
var lastConfigMtime = 0;

// 页面加载时自动从 config.json 加载
window.addEventListener('load', function() {
    loadFromFile();
    // 每 3 秒检查一次更新
    setInterval(checkConfigUpdate, 3000);
});

// 从 config.json 加载配置
async function loadFromFile() {
    try {
        var resp = await fetch('config.json?t=' + Date.now());
        if (!resp.ok) return;
        var data = await resp.json();
        var mtime = resp.headers.get('last-modified') || Date.now();
        lastConfigMtime = mtime;
        loadConfigData(data);
        console.log('✅ 已加载配置:', data.meta?.title || '无标题');
    } catch(e) {
        console.log('📂 暂无 config.json');
    }
}

// 加载配置数据到画布
function loadConfigData(data) {
    if (!data || !data.nodes) return;
    
    clearCanvas();
    
    // 延迟加载节点，确保画布已准备好
    setTimeout(function() {
        var nodeIdMap = {};
        
        // 第一遍：创建所有节点
        data.nodes.forEach(function(n) {
            var node = createNode(n.type, n.label || n.id, n.x, n.y);
            nodeIdMap[n.id] = node;
            if (n.config) {
                fillConfig(node, n.type, n.config);
            }
        });
        
        // 第二遍：创建连接（在节点都创建好之后）
        if (data.connections) {
            setTimeout(function() {
                data.connections.forEach(function(conn) {
                    var sourceId = nodeIdMap[conn.sourceId];
                    var targetId = nodeIdMap[conn.targetId];
                    // 通过 ID 在 nodes 数组中查找真正的节点对象
                    var sourceNode = nodes.find(function(n) { return n.id === sourceId; });
                    var targetNode = nodes.find(function(n) { return n.id === targetId; });
                    if (sourceNode && targetNode) {
                        // 查找源节点的输出端口和目标节点的输入端口
                        var sourcePorts = sourceNode.eps || [];
                        var targetPorts = targetNode.eps || [];
                        
                        var outPort = sourcePorts.find(function(p) { return p.indexOf('_out') >= 0; });
                        var inPort = targetPorts.find(function(p) { return p.indexOf('_in') >= 0; });
                        
                        if (outPort && inPort) {
                            try {
                                jsp.connect({uuids: [outPort, inPort]});
                            } catch(e) {
                                console.log('连接失败:', conn, e);
                            }
                        }
                    }
                });
            }, 300);
        }
    }, 200);
}

// 检查配置更新
async function checkConfigUpdate() {
    try {
        var resp = await fetch('config.json?t=' + Date.now());
        if (!resp.ok) return;
        var mtime = resp.headers.get('last-modified') || Date.now();
        if (mtime !== lastConfigMtime && lastConfigMtime !== 0) {
            console.log('🔄 检测到配置更新，重新加载...');
            var data = await resp.json();
            lastConfigMtime = mtime;
            loadConfigData(data);
        }
        lastConfigMtime = mtime;
    } catch(e) {}
}

        version: '2.0',
        flow: 'custom',
        meta: {title: '画布配置', description: ''},
        nodes: [],
        connections: []
    };
    
    // 收集节点
    nodes.forEach(function(n) {
        var nodeData = {
            id: n.id,
            type: n.type,
            label: n.label,
            x: n.x,
            y: n.y,
            config: n.config || {}
        };
        canvasData.nodes.push(nodeData);
    });
    
    // 收集连接
    var conns = jsp.getConnections();
    conns.forEach(function(c) {
        canvasData.connections.push({
            sourceId: c.sourceId,
            targetId: c.targetId
        });
    });
    
    return canvasData;
}


</script>
</body>
</html>
